name: Build & Release (Windows)

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Install Rust toolchain (stable)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Cache Cargo dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install pnpm dependencies
        run: pnpm install --frozen-lockfile

      - name: Initialize SQLite database
        run: |
          pnpm exec prisma db push
          cp prisma/dev.db dev.db
        env:
          DATABASE_URL: 'file:./dev.db'

      - name: Download portable Node.js for Windows
        run: node scripts/download-node.mjs win32 x64

      - name: Build Next.js standalone
        run: pnpm build
        env:
          IS_DESKTOP: 'true'
          DATABASE_URL: 'file:./dev.db'

      - name: Patch standalone output for Tauri bundling
        run: node scripts/copy-tauri-standalone.mjs
        env:
          IS_DESKTOP: 'true'

      - name: Build Tauri app (Windows MSI)
        id: build
        run: |
          pnpm exec tauri build 2>&1 | tee tauri-build.log
          echo "exit_code=$?" >> $GITHUB_OUTPUT
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          WINDOWS_CERT_FILE: ${{ secrets.WINDOWS_CERT_FILE }}
          WINDOWS_CERT_PASSWORD: ${{ secrets.WINDOWS_CERT_PASSWORD }}

      - name: Upload build log on failure
        if: failure() && steps.build.outcome == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: tauri-build-log
          path: tauri-build.log

      - name: Upload MSI installer
        uses: actions/upload-artifact@v4
        with:
          name: weavine-windows-msi
          path: src-tauri/target/release/bundle/msi/*
          if-no-files-found: error

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: List downloaded artifacts
        run: find artifacts/ -type f

      - name: Create Release
        run: |
          gh release create "${{ github.ref_name }}" \
            --repo "${{ github.repository }}" \
            --generate-notes \
            --draft
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Upload MSI to Release
        run: |
          gh release upload "${{ github.ref_name }}" \
            --repo "${{ github.repository }}" \
            artifacts/weavine-windows-msi/*.msi
        env:
          GH_TOKEN: ${{ github.token }}
