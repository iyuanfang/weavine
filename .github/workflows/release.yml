name: Build & Release (Windows)

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Install Rust toolchain (stable)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Cache Cargo dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install pnpm dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Next.js standalone
        run: pnpm build
        env:
          IS_DESKTOP: 'true'
          DATABASE_URL: 'file:./dev.db'

      - name: Patch standalone output for Tauri bundling
        run: node scripts/copy-tauri-standalone.mjs

      - name: Debug Rust/Cargo versions
        run: |
          echo "rustc=$(rustc --version)"
          echo "cargo=$(cargo --version)"
          echo "rustup=$(rustup --version 2>&1)"
        shell: bash

      - name: Debug - Tauri CLI version
        run: pnpm exec tauri --version
        shell: bash

      - name: Debug - Verify Rust target installed
        run: rustup target list --installed
        shell: bash

      - name: Debug - tauri info
        run: pnpm exec tauri info 2>&1 || true
        shell: bash

      - name: Debug - manual cargo invocation
        run: |
          echo "=== cargo check ==="
          cd src-tauri && cargo check 2>&1 | tail -30
          echo "=== check frontend dist exists ==="
          ls -la .next/standalone/server.js 2>&1
          echo "=== check src-tauri/Cargo.toml ==="
          ls -la src-tauri/Cargo.toml
          echo "=== check src-tauri/build.rs ==="
          cat src-tauri/build.rs
          echo "=== try cargo build --release ==="
          cd src-tauri && cargo build --release 2>&1 | tail -30
          echo "=== cargo build exit: $? ==="
        shell: bash
        continue-on-error: true

      - name: Build Tauri app (Windows MSI)
        id: build
        run: |
          set +e
          echo "=== RUNNING tauri build ==="
          pnpm exec tauri build 2>&1
          EXIT=$?
          echo "=== EXIT CODE: $EXIT ==="
          echo "=== BUNDLE DIR ==="
          ls -la src-tauri/target/x86_64-pc-windows-msvc/release/bundle/ 2>&1 || echo "no x64 bundle dir"
          ls -la src-tauri/target/release/bundle/ 2>&1 || echo "no release bundle dir"
          echo "EXIT_CODE=$EXIT" >> $GITHUB_OUTPUT
          exit $EXIT
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          WINDOWS_CERT_FILE: ${{ secrets.WINDOWS_CERT_FILE }}
          WINDOWS_CERT_PASSWORD: ${{ secrets.WINDOWS_CERT_PASSWORD }}

      - name: Upload MSI installer
        uses: actions/upload-artifact@v4
        with:
          name: weavine-windows-msi
          path: |
            src-tauri/target/x86_64-pc-windows-msvc/release/bundle/msi/*.msi
            src-tauri/target/x86_64-pc-windows-msvc/release/bundle/msi/*.blockmap
          if-no-files-found: error

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: List downloaded artifacts
        run: ls -la artifacts/

      - name: Verify Tauri updater artifacts
        run: |
          gh release view "${{ github.ref_name }}" --repo "${{ github.repository }}" --json tagName,assets \
            --jq '.assets[] | select(.name | test("\\.(msi|json|blockmap)$")) | "\(.name) - \(.size) bytes"'
        env:
          GH_TOKEN: ${{ github.token }}
