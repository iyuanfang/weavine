name: Build & Release (Cross-Platform)

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Install Rust toolchain (stable)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Cache Cargo dependencies (sccache)
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target
          shared-key: windows-cargo
          cache-on-failure: true

      - name: Install pnpm dependencies
        run: pnpm install --frozen-lockfile

      - name: Initialize SQLite database
        run: |
          pnpm exec prisma db push
          cp prisma/dev.db dev.db
        env:
          DATABASE_URL: 'file:./dev.db'

      - name: Download portable Node.js for Windows
        run: node scripts/download-node.mjs win32 x64

      - name: Build Next.js standalone
        run: pnpm build
        env:
          IS_DESKTOP: 'true'
          DATABASE_URL: 'file:./dev.db'

      - name: Patch standalone output for Tauri bundling
        run: node scripts/copy-tauri-standalone.mjs
        env:
          IS_DESKTOP: 'true'

      - name: Build Tauri app (Windows MSI)
        id: build
        run: |
          pnpm exec tauri build 2>&1 | tee tauri-build.log
          echo "exit_code=$?" >> $GITHUB_OUTPUT
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          WINDOWS_CERT_FILE: ${{ secrets.WINDOWS_CERT_FILE }}
          WINDOWS_CERT_PASSWORD: ${{ secrets.WINDOWS_CERT_PASSWORD }}

      - name: Upload build log on failure
        if: failure() && steps.build.outcome == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: tauri-build-log
          path: tauri-build.log

      - name: Upload MSI installer
        uses: actions/upload-artifact@v4
        with:
          name: weavine-windows-msi
          path: src-tauri/target/release/bundle/msi/*
          if-no-files-found: error

  build-linux:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Install Rust toolchain (stable)
        uses: dtolnay/rust-toolchain@stable

      - name: Install sccache
        run: |
          sudo apt-get install -y -qq sccache
          echo "RUSTC_WRAPPER=sccache" >> $GITHUB_ENV
          mkdir -p ~/.cache/sccache

      - name: Install Tauri system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libsoup-3.0-dev \
            libjavascriptcoregtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev

      - name: Cache Cargo dependencies (sccache)
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target
          shared-key: linux-cargo
          cache-on-failure: true

      - name: Install pnpm dependencies
        run: pnpm install --frozen-lockfile

      - name: Initialize SQLite database
        run: |
          pnpm exec prisma db push
          cp prisma/dev.db dev.db
        env:
          DATABASE_URL: 'file:./dev.db'

      - name: Download portable Node.js for Linux
        run: |
          mkdir -p node_bin
          # Copy the Node.js binary already installed by setup-node
          cp "$(which node)" node_bin/node
          chmod +x node_bin/node
          ./node_bin/node --version
          ldd node_bin/node | head -5 || true

      - name: Build Next.js standalone
        run: pnpm build
        env:
          IS_DESKTOP: 'true'
          DATABASE_URL: 'file:./dev.db'

      - name: Patch standalone output for Tauri bundling
        run: node scripts/copy-tauri-standalone.mjs
        env:
          IS_DESKTOP: 'true'

      - name: Build Tauri app (Linux)
        id: build
        run: |
          pnpm exec tauri build 2>&1 | tee tauri-build.log
          echo "exit_code=$?" >> $GITHUB_OUTPUT
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

      - name: Upload build log on failure
        if: failure() && steps.build.outcome == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: tauri-build-log-linux
          path: tauri-build.log

      - name: Stage Linux bundle artifacts
        if: always() && steps.build.outcome == 'success'
        run: |
          echo "Bundle directory tree:"
          find src-tauri/target/release/bundle -maxdepth 4 -type f || true
          mkdir -p linux-out
          # Use xargs so empty result is not an error
          find src-tauri/target/release/bundle -type f \( -name '*.deb' -o -name '*.AppImage' \) -print0 2>/dev/null \
            | xargs -0 -r -I {} cp -v {} linux-out/ 2>&1 || echo "No .deb or .AppImage files found to stage"
          echo "Staged artifacts:"
          ls -la linux-out/ || true

      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v4
        with:
          name: weavine-linux
          path: linux-out/*
          if-no-files-found: error

  release:
    needs: [build-windows, build-linux]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: List downloaded artifacts
        run: find artifacts/ -type f

      - name: Create Release
        run: |
          gh release create "${{ github.ref_name }}" \
            --repo "${{ github.repository }}" \
            --generate-notes
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Upload Windows MSI to Release
        run: |
          gh release upload "${{ github.ref_name }}" \
            --repo "${{ github.repository }}" \
            --clobber \
            artifacts/weavine-windows-msi/*.msi
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Upload Linux artifacts to Release
        run: |
          # actions/upload-artifact@v4 preserves relative paths
          find artifacts/weavine-linux -type f \( -name '*.deb' -o -name '*.AppImage' \) -print0 | \
            xargs -0 gh release upload "${{ github.ref_name }}" \
              --repo "${{ github.repository }}" \
              --clobber
        env:
          GH_TOKEN: ${{ github.token }}
