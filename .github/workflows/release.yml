name: Build & Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Cache Electron binary
        uses: actions/cache@v4
        with:
          path: ~/.electron
          key: ${{ runner.os }}-electron-${{ hashFiles('pnpm-lock.yaml') }}

      - name: Install system dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq libfuse2 fakeroot dpkg-dev

      - name: Cache electron-builder
        uses: actions/cache@v4
        with:
          path: ~/.cache/electron-builder
          key: ${{ runner.os }}-builder-${{ hashFiles('pnpm-lock.yaml') }}

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Create SQLite database
        run: |
          pnpm exec prisma db push --accept-data-loss
          pnpm exec prisma generate
        env:
          DATABASE_URL: 'file:./dev.db'

      - name: Cache Next.js build
        uses: actions/cache@v4
        with:
          path: .next/cache
          key: ${{ runner.os }}-next-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-next-

      - name: Build Next.js standalone
        run: pnpm exec next build
        env:
          IS_DESKTOP: 'true'
          DATABASE_URL: 'file:./dev.db'
          NODE_OPTIONS: '--max-old-space-size=4096'

      - name: Copy Prisma engines to standalone
        run: node scripts/postbuild-desktop.mjs

      - name: Debug and build Electron package
        id: build_electron
        shell: bash
        run: |
          TARGETS="${{ runner.os == 'Linux' && '--linux dir' || '' }}"
          # Capture build output and exit code
          ./node_modules/.bin/electron-builder --publish never $TARGETS > ebuilder.log 2>&1
          EB_EXIT=$?
          # Write debug info + build output to step summary
          {
            echo '## 🔍 electron-builder debug'
            echo "**Version:** \`$(./node_modules/.bin/electron-builder --version 2>&1)\`"
            echo ''
            echo '**Standalone structure:**'
            ls -la .next/standalone/ | sed 's/^/    /'
            echo ''
            echo '**Build output (ebuilder.log):**'
            echo '```'
            cat ebuilder.log
            echo '```'
            echo "**Exit code: \`$EB_EXIT\`**"
          } >> "$GITHUB_STEP_SUMMARY"
          echo "exit_code=$EB_EXIT" >> "$GITHUB_OUTPUT"
          exit $EB_EXIT
        env:
          CSC_LINK: ''
          CSC_KEY_PASSWORD: ''

      - name: Upload ebuilder log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: ebuilder-log-${{ runner.os }}
          path: ebuilder.log

      - uses: actions/upload-artifact@v4
        with:
          name: PRM-${{ runner.os }}
          path: release/*

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: artifacts/**/*
          generate_release_notes: true
