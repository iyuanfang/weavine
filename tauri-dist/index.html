<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Weavine</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{display:flex;align-items:center;justify-content:center;height:100vh;background:#f5f5f5;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;color:#666}
.container{text-align:center;padding:2rem;max-width:400px}
.spinner{width:40px;height:40px;margin:0 auto 1.5rem;border:4px solid #e0e0e0;border-top-color:#4f46e5;border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
h2{font-weight:500;font-size:1.2rem;color:#333;margin-bottom:.5rem}
p{font-size:.9rem;color:#888;line-height:1.5}
.hidden{display:none!important}
.error h2{color:#dc2626}
.btn{display:inline-block;margin-top:1rem;padding:.6rem 1.5rem;background:#4f46e5;color:#fff;border:none;border-radius:6px;font-size:.9rem;cursor:pointer}
.btn:hover{background:#4338ca}
.detail{margin-top:1rem;font-size:.75rem;color:#aaa;word-break:break-all}
</style>
</head>
<body>
<div class="container">
<div id="loading">
<div class="spinner"></div>
<h2>正在启动 Weavine</h2>
<p>本地服务启动中，请稍候…</p>
</div>
<div id="error" class="hidden">
<h2>启动失败</h2>
<p id="errorMsg">无法连接到后端服务 (127.0.0.1:3199)</p>
<p style="font-size:.85rem;color:#999;margin-top:.5rem">
请确认已安装 <a href="https://nodejs.org" target="_blank" style="color:#4f46e5">Node.js</a><br>
如果问题持续，尝试重新安装应用
</p>
<button class="btn" onclick="location.reload()">重试</button>
<div class="detail" id="detail"></div>
</div>
</div>
<script>
var TARGET='http://127.0.0.1:3199';
var MAX=60;
var n=0;
(function p(){fetch(TARGET+'/api/health',{mode:'no-cors'}).then(function(){window.location.href=TARGET;}).catch(function(){n++;if(n<MAX){setTimeout(p,500)}else{document.getElementById('loading').classList.add('hidden');document.getElementById('error').classList.remove('hidden');document.getElementById('detail').textContent='已等待 '+(MAX*0.5)+' 秒，服务未响应'}});})()
</script>
</body>
</html>
