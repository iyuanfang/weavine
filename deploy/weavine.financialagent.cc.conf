# weavine.financialagent.cc -> weavine-web (Rust) for /api + SPA at /

server {
    listen 80;
    server_name weavine.financialagent.cc;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    client_max_body_size 25m;
    server_name weavine.financialagent.cc;
    ssl_certificate /etc/nginx/ssl/cert.pem;
    ssl_certificate_key /etc/nginx/ssl/key.pem;

    # API + sync endpoints -> Rust binary on :3000
    location /api/ {
        proxy_pass http://127.0.0.1:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
    }

    # future v0.2.0 multi-device sync surface (same backend, drop-in)
    location /weavine/v1/ {
        proxy_pass http://127.0.0.1:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
    }

    # Landing page (static) — exact match for / only. Everything else falls
    # through to the SPA below.
    location = / {
        root /www/weavine/landing;
        index index.html;
        try_files $uri /index.html;
    }

    # SPA static — fall back to index.html so client-side routes resolve on hard refresh.
    root /www/weavine/spa;
    index index.html;
    location / {
        try_files $uri $uri/ /index.html;
    }
}
