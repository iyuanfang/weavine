# weavine.financialagent.cc -> weavine-web (Rust) for /api + SPA + landing at /

server {
    listen 80;
    server_name weavine.financialagent.cc;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    client_max_body_size 25m;
    server_name weavine.financialagent.cc;
    ssl_certificate /etc/nginx/ssl/cert.pem;
    ssl_certificate_key /etc/nginx/ssl/key.pem;

    # API + sync endpoints -> Rust binary on :3000
    location /api/ {
        proxy_pass http://127.0.0.1:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
    }

    # v0.2.0 multi-device sync surface (same backend)
    location /weavine/v1/ {
        proxy_pass http://127.0.0.1:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
    }

    # Landing page at exact /. Note: must set `root` here so try_files
    # resolves against the landing tree, NOT the server-level SPA root.
    # Without `root` in this block, the trailing `/index.html` in try_files
    # is resolved against /www/weavine/spa and silently serves the SPA.
    location = / {
        root /www/weavine/landing;
        try_files /index.html =404;
    }

    # Landing static assets (CSS, future screenshots).
    location /assets/ {
        root /www/weavine/landing;
        try_files $uri =404;
    }

    # SPA static assets. vite outputs hashed bundles to `dist/spa/` (not
    # `dist/assets/`) so the landing's /assets/ doesn't shadow them.
    location /spa/ {
        root /www/weavine/spa;
        try_files $uri =404;
    }

    # Landing favicon — exact match overrides SPA fallback.
    location = /favicon.svg {
        root /www/weavine/landing;
    }

    # SPA static — fall back to index.html so client-side routes resolve on hard refresh.
    root /www/weavine/spa;
    index index.html;
    location / {
        try_files $uri $uri/ /index.html;
    }
}
